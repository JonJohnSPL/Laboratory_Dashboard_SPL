<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPL Dashboard Launchpad</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0d0f14;
      --surface:#13161e;
      --surface2:#1a1e28;
      --border:#2a2f3f;
      --accent:#00d4ff;
      --field:#59d67d;
      --tests:#ff8c42;
      --warn:#ffd166;
      --text:#e2e8f0;
      --muted:#64748b;
      --mono:'Share Tech Mono',monospace;
      --sans:'Barlow Condensed',sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      min-height:100vh;
      padding:24px;
      background:
        radial-gradient(circle at 15% 15%, rgba(0,212,255,.09), transparent 34%),
        radial-gradient(circle at 82% 18%, rgba(89,214,125,.09), transparent 30%),
        linear-gradient(180deg, #0b0e13 0%, #10141c 100%);
      color:var(--text);
      font-family:var(--sans);
    }
    .shell{max-width:1240px;margin:0 auto;}
    header{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:24px;
      padding-bottom:20px;
      margin-bottom:24px;
      border-bottom:1px solid var(--border);
    }
    .header-left{display:flex;align-items:flex-start;gap:18px;min-width:0;}
    .spl-logo{width:176px;max-width:36vw;height:auto;filter:drop-shadow(0 16px 26px rgba(0,212,255,.08));}
    .kicker{
      font-family:var(--mono);
      font-size:11px;
      letter-spacing:2px;
      color:var(--muted);
      text-transform:uppercase;
    }
    h1{
      margin-top:8px;
      font-size:34px;
      letter-spacing:3px;
      text-transform:uppercase;
      color:var(--accent);
    }
    .header-right{display:flex;flex-direction:column;align-items:flex-end;gap:10px;}
    .nav-row,.page-nav-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    .nav-btn{
      background:transparent;
      color:var(--muted);
      border:1px solid var(--border);
      padding:9px 16px;
      border-radius:6px;
      cursor:pointer;
      transition:all .18s ease;
      font-family:var(--sans);
      font-size:12px;
      font-weight:700;
      letter-spacing:1px;
      text-transform:uppercase;
    }
    .nav-btn:hover,.nav-btn.current{
      border-color:rgba(0,212,255,.35);
      color:var(--accent);
    }
    .clock{text-align:right;font-family:var(--mono);}
    .clock span{
      display:block;
      font-size:10px;
      letter-spacing:2px;
      color:var(--muted);
      text-transform:uppercase;
    }
    .clock strong{
      display:block;
      margin-top:4px;
      font-size:24px;
      color:var(--text);
      font-weight:400;
    }
    .clock em{
      display:block;
      margin-top:3px;
      color:var(--muted);
      font-style:normal;
      font-size:11px;
    }
    .launch-grid{display:grid;grid-template-columns:repeat(4, minmax(0, 1fr));gap:16px;}
    .launch-card{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      min-height:132px;
      padding:24px;
      background:rgba(19,22,30,.92);
      border:1px solid var(--border);
      border-radius:12px;
      box-shadow:0 18px 48px rgba(0,0,0,.24);
      text-decoration:none;
      color:inherit;
      position:relative;
      overflow:hidden;
      transition:transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    }
    .launch-card.has-children{gap:16px;}
    .launch-card::before{
      content:'';
      position:absolute;
      inset:auto -25% -35% auto;
      width:180px;
      height:180px;
      border-radius:50%;
      background:rgba(255,255,255,.04);
      filter:blur(8px);
    }
    .launch-card:hover{transform:translateY(-4px);box-shadow:0 24px 54px rgba(0,0,0,.32);}
    .launch-card:focus-visible{outline:2px solid var(--accent);outline-offset:4px;}
    .launch-card-main{
      color:inherit;
      text-decoration:none;
      position:relative;
      z-index:1;
    }
    .launch-card-main:focus-visible{outline:2px solid currentColor;outline-offset:5px;border-radius:4px;}
    .launch-card.lab:hover{border-color:rgba(0,212,255,.36);}
    .launch-card.field:hover{border-color:rgba(89,214,125,.42);}
    .launch-card.tests:hover{border-color:rgba(255,140,66,.38);}
    .launch-card.standards:hover{border-color:rgba(255,209,102,.36);}
    .launch-card.consumables:hover{border-color:rgba(6,214,160,.34);}
    .launch-card.import:hover{border-color:rgba(255,56,96,.3);}
    .launch-card.map:hover{border-color:rgba(91,140,245,.36);}
    .launch-card.people:hover{border-color:rgba(116,213,255,.34);}
    .launch-card.clients:hover{border-color:rgba(255,188,109,.34);}
    .launch-card h3{
      font-size:26px;
      letter-spacing:2px;
      text-transform:uppercase;
      text-align:center;
      position:relative;
      z-index:1;
    }
    .launch-card.lab h3{color:var(--accent);}
    .launch-card.field h3{color:var(--field);}
    .launch-card.tests h3{color:var(--tests);}
    .launch-card.standards h3{color:var(--warn);}
    .launch-card.consumables h3{color:#06d6a0;}
    .launch-card.import h3{color:#ff93ac;}
    .launch-card.map h3{color:#8db3ff;}
    .launch-card.people h3{color:#74d5ff;}
    .launch-card.clients h3{color:#ffbc6d;}
    .launch-sublinks{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:8px;
      width:100%;
      position:relative;
      z-index:1;
    }
    .launch-sublink{
      padding:8px 10px;
      border:1px solid rgba(100,116,139,.28);
      border-radius:6px;
      color:var(--muted);
      text-align:center;
      text-decoration:none;
      font-family:var(--mono);
      font-size:10px;
      letter-spacing:1px;
      text-transform:uppercase;
      transition:all .18s ease;
    }
    .launch-sublink:hover,.launch-sublink:focus-visible{
      border-color:rgba(0,212,255,.36);
      color:var(--accent);
      outline:none;
    }
    @media (max-width: 1100px){
      .launch-grid{grid-template-columns:repeat(2, minmax(0, 1fr));}
    }
    @media (max-width: 760px){
      body{padding:14px;}
      header{flex-direction:column;align-items:stretch;}
      .header-right{align-items:flex-start;}
      .nav-row,.page-nav-row{justify-content:flex-start;}
      .launch-grid{grid-template-columns:1fr;}
      .launch-sublinks{grid-template-columns:1fr;}
      .spl-logo{width:138px;}
      h1{font-size:28px;}
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="header-left">
        <img class="spl-logo" src="assets/spl-logo.svg" alt="SPL">
        <div>
          <div class="kicker">Shared Operations Workspace</div>
          <h1>SPL Dashboard Launchpad</h1>
        </div>
      </div>
      <div class="header-right">
        <div class="clock">
          <span>Current Time</span>
          <strong id="clock">--:--:--</strong>
          <em id="datedisp"></em>
        </div>
        <div data-session-slot></div>
        <div class="nav-row">
          <button class="nav-btn current" type="button">Home</button>
          <button class="nav-btn" onclick="window.location.href='field-dashboard.html'">Field Ops</button>
          <button class="nav-btn" onclick="window.location.href='lab-dashboard.html'">Lab WIP</button>
          <button class="nav-btn" onclick="window.location.href='SureMap/SPLClientMap.HTML'">SureMap</button>
          <button class="nav-btn" onclick="window.location.href='employees.html'">Employees</button>
          <button class="nav-btn" onclick="window.location.href='clients.html'">Clients</button>
        </div>
      </div>
    </header>

    <section class="launch-grid" id="launchpad-workspaces">
      <a class="launch-card field" href="field-dashboard.html">
        <h3>Field Ops</h3>
      </a>
      <div class="launch-card lab has-children">
        <a class="launch-card-main" href="lab-dashboard.html"><h3>Lab WIP</h3></a>
        <div class="launch-sublinks">
          <a class="launch-sublink" href="standards.html">Standards</a>
          <a class="launch-sublink" href="consumables.html">Consumables</a>
          <a class="launch-sublink" href="import.html">Import</a>
          <a class="launch-sublink" href="test-types.html">Test Types</a>
        </div>
      </div>
      <a class="launch-card people" href="employees.html">
        <h3>Employees</h3>
      </a>
      <a class="launch-card clients" href="clients.html">
        <h3>Clients</h3>
      </a>
      <a class="launch-card map" href="SureMap/SPLClientMap.HTML">
        <h3>SureMap</h3>
      </a>
    </section>
  </div>

  <script src="app-config.js"></script>
  <script>
    window.APP_CONFIG = Object.assign({}, window.APP_CONFIG || {}, {
      authTitle: 'SPL Dashboard Launchpad',
      authHelpText: 'Sign in to access the shared SPL dashboard workspaces.'
    });
  </script>
  <script src="cloud-auth.js"></script>
  <script>
    (function tick(){
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', {
        hour:'2-digit',
        minute:'2-digit',
        second:'2-digit'
      });
      document.getElementById('datedisp').textContent = now.toLocaleDateString('en-US', {
        weekday:'short',
        month:'short',
        day:'numeric',
        year:'numeric'
      });
      setTimeout(tick, 1000);
    })();
  </script>
</body>
</html>
