<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPL Password Reset</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0d0f14;
      --surface:#13161e;
      --border:#2a2f3f;
      --accent:#00d4ff;
      --text:#e2e8f0;
      --muted:#94a3b8;
      --dim:#64748b;
      --danger:#ff3860;
      --mono:'Share Tech Mono',monospace;
      --sans:'Barlow Condensed',sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      background:
        radial-gradient(circle at 15% 15%, rgba(0,212,255,.09), transparent 34%),
        radial-gradient(circle at 82% 18%, rgba(89,214,125,.08), transparent 30%),
        linear-gradient(180deg, #0b0e13 0%, #10141c 100%);
      color:var(--text);
      font-family:var(--sans);
    }
    .card{
      width:min(460px, 100%);
      border:1px solid rgba(42,47,63,.95);
      border-radius:18px;
      background:linear-gradient(180deg, rgba(19,22,30,.98), rgba(13,15,20,.98));
      box-shadow:0 28px 60px rgba(0,0,0,.45);
      overflow:hidden;
    }
    .head{padding:24px 26px 16px;border-bottom:1px solid rgba(42,47,63,.9);}
    .kicker{color:var(--dim);font-family:var(--mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;}
    h1{margin-top:8px;color:var(--accent);font-size:32px;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
    .copy{margin-top:8px;color:var(--muted);font-family:var(--mono);font-size:12px;line-height:1.5;}
    form{padding:22px 26px 26px;display:grid;gap:14px;}
    .field{display:grid;gap:6px;}
    label{color:var(--dim);font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;}
    input{
      width:100%;
      border:1px solid rgba(42,47,63,.95);
      border-radius:8px;
      background:#0d0f14;
      color:var(--text);
      padding:12px 14px;
      outline:none;
      font-family:var(--mono);
      font-size:13px;
    }
    input:focus{border-color:var(--accent);box-shadow:0 0 0 1px rgba(0,212,255,.18);}
    .status{min-height:18px;color:var(--muted);font-family:var(--mono);font-size:11px;line-height:1.5;}
    .status.error{color:var(--danger);}
    button{
      border:none;
      border-radius:8px;
      background:var(--accent);
      color:#05080c;
      padding:12px 14px;
      cursor:pointer;
      font-family:var(--sans);
      font-size:14px;
      font-weight:700;
      letter-spacing:2px;
      text-transform:uppercase;
    }
    button:hover{filter:brightness(1.05);}
    button:disabled{opacity:.55;cursor:not-allowed;}
    .link-row{display:flex;justify-content:center;}
    a{color:var(--muted);font-family:var(--mono);font-size:11px;text-decoration:none;}
    a:hover{color:var(--accent);}
    @media (max-width: 520px){
      body{padding:16px;}
      .head{padding:20px 18px 14px;}
      form{padding:18px;}
      h1{font-size:28px;}
    }
  </style>
</head>
<body>
  <main class="card">
    <section class="head">
      <div class="kicker">Secure Access</div>
      <h1>Password Reset</h1>
      <p class="copy" id="page-copy">Enter your email address and we will send a password reset link.</p>
    </section>

    <form id="request-form" autocomplete="on">
      <div class="field">
        <label for="reset-email">Email</label>
        <input id="reset-email" name="email" type="email" autocomplete="username" required>
      </div>
      <div class="status" id="request-status" aria-live="polite"></div>
      <button type="submit">Send Reset Link</button>
      <div class="link-row"><a id="back-link" href="index.html">Back to dashboard</a></div>
    </form>

    <form id="update-form" autocomplete="on" hidden>
      <div class="field">
        <label for="new-password">New Password</label>
        <input id="new-password" name="password" type="password" autocomplete="new-password" required minlength="6">
      </div>
      <div class="field">
        <label for="confirm-password">Confirm Password</label>
        <input id="confirm-password" name="confirmPassword" type="password" autocomplete="new-password" required minlength="6">
      </div>
      <div class="status" id="update-status" aria-live="polite"></div>
      <button type="submit">Update Password</button>
    </form>
  </main>

  <script src="app-config.js"></script>
  <script>
    (function(){
      const config = normalizeConfig(window.APP_CONFIG || {});
      const requestForm = document.getElementById('request-form');
      const updateForm = document.getElementById('update-form');
      const requestStatus = document.getElementById('request-status');
      const updateStatus = document.getElementById('update-status');
      const pageCopy = document.getElementById('page-copy');
      const backLink = document.getElementById('back-link');
      const returnTo = getSafeReturnTo();
      const session = parseRecoverySession();

      backLink.href = returnTo;

      if(!config.supabaseUrl || !config.supabaseAnonKey){
        setStatus(requestStatus, 'Cloud auth is not configured for this site.', true);
        requestForm.querySelector('button').disabled = true;
        return;
      }

      if(session){
        requestForm.hidden = true;
        updateForm.hidden = false;
        pageCopy.textContent = 'Enter a new password to finish resetting your account.';
        cleanAuthUrl();
      }

      requestForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        const email = String(new FormData(requestForm).get('email') || '').trim();
        if(!email){
          setStatus(requestStatus, 'Enter your email address.', true);
          return;
        }

        const button = requestForm.querySelector('button');
        button.disabled = true;
        setStatus(requestStatus, 'Sending reset link...', false);

        try {
          await requestResetEmail(email);
          setStatus(requestStatus, 'Reset email sent. Check your inbox, then return from the link in that email.', false);
        } catch (error){
          console.error('Password reset email failed:', error);
          setStatus(requestStatus, error.message || 'Unable to send reset email.', true);
        } finally {
          button.disabled = false;
        }
      });

      updateForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        const formData = new FormData(updateForm);
        const password = String(formData.get('password') || '');
        const confirmPassword = String(formData.get('confirmPassword') || '');

        if(password.length < 6){
          setStatus(updateStatus, 'Password must be at least 6 characters.', true);
          return;
        }
        if(password !== confirmPassword){
          setStatus(updateStatus, 'Passwords do not match.', true);
          return;
        }

        const button = updateForm.querySelector('button');
        button.disabled = true;
        setStatus(updateStatus, 'Updating password...', false);

        try {
          await updatePassword(password, session.access_token);
          setStatus(updateStatus, 'Password updated. Redirecting...', false);
          setTimeout(() => { window.location.href = returnTo; }, 900);
        } catch (error){
          console.error('Password update failed:', error);
          setStatus(updateStatus, error.message || 'Unable to update password.', true);
        } finally {
          button.disabled = false;
        }
      });

      async function requestResetEmail(email){
        const response = await fetch(buildUrl('/auth/v1/recover'), {
          method: 'POST',
          headers: {
            apikey: config.supabaseAnonKey,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            email,
            redirect_to: `${window.location.origin}${window.location.pathname}?returnTo=${encodeURIComponent(returnTo)}`
          })
        });
        const payload = await response.json().catch(() => ({}));
        if(!response.ok){
          throw new Error(payload?.msg || payload?.error_description || payload?.error || 'Unable to send reset email.');
        }
      }

      async function updatePassword(password, accessToken){
        const response = await fetch(buildUrl('/auth/v1/user'), {
          method: 'PUT',
          headers: {
            apikey: config.supabaseAnonKey,
            Authorization: `Bearer ${accessToken}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ password })
        });
        const payload = await response.json().catch(() => ({}));
        if(!response.ok){
          throw new Error(payload?.msg || payload?.error_description || payload?.error || 'Unable to update password.');
        }
      }

      function parseRecoverySession(){
        const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ''));
        const accessToken = hashParams.get('access_token');
        const refreshToken = hashParams.get('refresh_token');
        if(!accessToken || !refreshToken){
          return null;
        }
        return {
          access_token: accessToken,
          refresh_token: refreshToken,
          type: hashParams.get('type') || ''
        };
      }

      function normalizeConfig(value){
        return {
          supabaseUrl: String(value.supabaseUrl || '').replace(/\/+$/, ''),
          supabaseAnonKey: String(value.supabaseAnonKey || '')
        };
      }

      function buildUrl(path){
        return `${config.supabaseUrl}${path}`;
      }

      function setStatus(element, message, isError){
        element.textContent = message || '';
        element.classList.toggle('error', !!isError);
      }

      function getSafeReturnTo(){
        const fallback = 'index.html';
        const value = new URLSearchParams(window.location.search).get('returnTo') || fallback;
        if(/^https?:\/\//i.test(value) || value.startsWith('//')){
          return fallback;
        }
        return value;
      }

      function cleanAuthUrl(){
        history.replaceState(null, document.title, `${window.location.pathname}${window.location.search}`);
      }
    })();
  </script>
</body>
</html>
